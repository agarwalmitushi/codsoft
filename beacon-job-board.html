<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beacon — Find work worth signing up for</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --ink:#14171F;
  --ink-soft:#1E2233;
  --paper:#FAF7F1;
  --paper-dim:#F1ECDF;
  --line:#DED7C4;
  --line-dark:#333750;
  --amber:#E8A33D;
  --amber-dark:#C6842A;
  --teal:#3E7C74;
  --teal-dim:#E4EEEC;
  --rose:#C1554A;
  --rose-dim:#F6E4E2;
  --text-muted:#767B8C;
  --text-on-dark-muted:#9AA0B4;
  --radius:10px;
  --shadow:0 1px 2px rgba(20,23,31,0.06), 0 8px 24px -12px rgba(20,23,31,0.18);
  --serif:'Fraunces', Georgia, serif;
  --sans:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;margin:0;letter-spacing:-0.01em;}
p{margin:0;}
img{max-width:100%;display:block;}
::selection{background:var(--amber);color:var(--ink);}
:focus-visible{outline:2px solid var(--amber-dark);outline-offset:2px;}

.wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
@media(max-width:640px){.wrap{padding:0 16px;}}

/* ============ NAV ============ */
.nav{
  position:sticky;top:0;z-index:40;
  background:rgba(250,247,241,0.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.nav-inner{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:28px;}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--serif);font-style:italic;font-weight:700;font-size:22px;letter-spacing:-0.01em;}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 4px rgba(232,163,61,0.25);flex-shrink:0;}
.nav-links{display:flex;gap:4px;flex:1;}
.nav-link{padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--ink);}
.nav-link:hover{background:var(--paper-dim);}
.nav-link.active{background:var(--ink);color:var(--paper);}
.nav-right{display:flex;align-items:center;gap:10px;}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:transparent;display:flex;align-items:center;justify-content:center;position:relative;}
.icon-btn:hover{background:var(--paper-dim);}
.badge-count{position:absolute;top:-4px;right:-4px;background:var(--rose);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-family:var(--mono);}
.btn{
  display:inline-flex;align-items:center;gap:6px;justify-content:center;
  padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;border:1px solid transparent;
  transition:transform .12s ease, background .12s ease;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--ink);color:var(--paper);}
.btn-primary:hover{background:var(--ink-soft);}
.btn-amber{background:var(--amber);color:var(--ink);}
.btn-amber:hover{background:var(--amber-dark);}
.btn-ghost{background:transparent;border-color:var(--line);color:var(--ink);}
.btn-ghost:hover{background:var(--paper-dim);}
.btn-sm{padding:7px 12px;font-size:13px;}
.btn-danger{background:var(--rose-dim);color:var(--rose);}
.btn-danger:hover{background:#f0d2ce;}
.btn-block{width:100%;}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;border-radius:24px;background:var(--paper-dim);border:1px solid var(--line);font-size:13px;font-weight:600;}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.hamburger{display:none;width:36px;height:36px;border:1px solid var(--line);border-radius:8px;background:transparent;align-items:center;justify-content:center;}
.mobile-menu{display:none;flex-direction:column;gap:2px;padding:10px 16px 16px;border-bottom:1px solid var(--line);background:var(--paper);}
.mobile-menu.open{display:flex;}
.mobile-menu .nav-link{padding:12px;}

@media(max-width:860px){
  .nav-links{display:none;}
  .hamburger{display:flex;}
}

/* ============ HERO ============ */
.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--line);}
.hero-inner{max-width:1180px;margin:0 auto;padding:64px 24px 56px;display:grid;grid-template-columns:1.1fr 0.7fr;gap:40px;align-items:center;}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--teal);font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--teal);}
.hero h1{font-size:clamp(34px,5vw,56px);line-height:1.03;max-width:620px;}
.hero h1 em{font-style:italic;color:var(--amber-dark);}
.hero-sub{margin-top:18px;font-size:17px;color:var(--text-muted);max-width:480px;}
.search-bar{margin-top:28px;display:flex;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:6px;gap:6px;}
.search-bar input{flex:1;border:none;background:transparent;padding:12px 14px;font-size:15px;min-width:0;}
.search-bar input:focus{outline:none;}
.search-bar .divider{width:1px;background:var(--line);margin:8px 0;}
.search-bar button{white-space:nowrap;}
@media(max-width:640px){.search-bar{flex-direction:column;}.search-bar .divider{display:none;}}
.stat-row{display:flex;gap:26px;margin-top:26px;flex-wrap:wrap;}
.stat b{font-family:var(--serif);font-size:22px;display:block;}
.stat span{font-size:12px;color:var(--text-muted);font-family:var(--mono);}
.beacon-graphic{position:relative;width:100%;aspect-ratio:1;max-width:340px;justify-self:end;}
@media(max-width:860px){.hero-inner{grid-template-columns:1fr;}.beacon-graphic{display:none;}}

/* ============ CHIPS ============ */
.chip-row{display:flex;gap:8px;flex-wrap:wrap;padding:22px 0 0;}
.chip{padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:500;white-space:nowrap;}
.chip:hover{border-color:var(--ink);}
.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* ============ SECTION ============ */
.section{padding:52px 0;}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;}
.section-head h2{font-size:26px;}
.section-head .sub{color:var(--text-muted);font-size:14px;margin-top:4px;}

/* ============ JOB CARD ============ */
.card-scroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;margin:0 -24px;padding-left:24px;padding-right:24px;}
.card-scroll::-webkit-scrollbar{height:6px;}
.card-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.job-card{
  position:relative;background:#fff;border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 18px 18px 22px;cursor:pointer;transition:box-shadow .15s ease, transform .15s ease, border-color .15s ease;
}
.job-card:hover{box-shadow:var(--shadow);border-color:#c8c0a8;transform:translateY(-2px);}
.job-card::before{
  content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:2px;
  background:repeating-linear-gradient(to bottom, var(--line) 0 3px, transparent 3px 7px);
}
.job-card.urgent::before{background:repeating-linear-gradient(to bottom, var(--amber) 0 3px, transparent 3px 7px);}
.card-scroll .job-card{min-width:290px;max-width:290px;flex-shrink:0;}
.job-top{display:flex;gap:12px;align-items:flex-start;}
.logo-sq{width:42px;height:42px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-weight:700;font-size:15px;}
.job-title{font-family:var(--serif);font-size:17px;font-weight:600;line-height:1.25;}
.job-company{font-size:13px;color:var(--text-muted);margin-top:2px;}
.job-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;font-size:12px;color:var(--text-muted);}
.job-meta span{display:flex;align-items:center;gap:4px;}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.tag{background:var(--paper-dim);border-radius:6px;padding:4px 8px;font-size:11px;font-family:var(--mono);color:var(--ink-soft);}
.tag.teal{background:var(--teal-dim);color:var(--teal);}
.tag.amber{background:#FBEBD1;color:var(--amber-dark);}
.job-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--line);}
.salary{font-family:var(--mono);font-size:13px;font-weight:600;}
.posted{font-size:11px;color:var(--text-muted);}
.urgent-pill{position:absolute;top:14px;right:14px;background:var(--amber);color:var(--ink);font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;font-family:var(--mono);display:flex;align-items:center;gap:4px;}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--ink);animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

.job-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

/* ============ LISTINGS LAYOUT ============ */
.listings-layout{display:grid;grid-template-columns:250px 1fr;gap:32px;align-items:flex-start;}
@media(max-width:860px){.listings-layout{grid-template-columns:1fr;}}
.filter-panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;position:sticky;top:80px;}
.filter-group{margin-bottom:22px;}
.filter-group:last-child{margin-bottom:0;}
.filter-group h4{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;font-family:var(--mono);color:var(--text-muted);margin-bottom:10px;font-weight:500;}
.check-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:14px;cursor:pointer;}
.check-row input{width:15px;height:15px;accent-color:var(--ink);}
.select-field{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:14px;}
.mobile-filter-toggle{display:none;margin-bottom:16px;}
@media(max-width:860px){
  .filter-panel{position:static;display:none;}
  .filter-panel.open{display:block;}
  .mobile-filter-toggle{display:flex;}
}
.results-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.results-count{font-size:14px;color:var(--text-muted);}
.results-count b{color:var(--ink);}
.listings-list{display:flex;flex-direction:column;gap:12px;}
.listings-list .job-card{padding:20px 20px 20px 24px;}
.listings-list .job-top{align-items:center;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-state h3{color:var(--ink);margin-bottom:8px;}

/* ============ JOB DETAIL ============ */
.detail-layout{display:grid;grid-template-columns:1fr 300px;gap:40px;align-items:flex-start;}
@media(max-width:860px){.detail-layout{grid-template-columns:1fr;}}
.detail-header{border-bottom:1px solid var(--line);padding-bottom:24px;margin-bottom:24px;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);margin-bottom:18px;font-weight:500;}
.back-link:hover{color:var(--ink);}
.detail-title-row{display:flex;gap:16px;align-items:flex-start;}
.detail-title-row h1{font-size:clamp(24px,3.4vw,34px);}
.detail-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:14px;color:var(--text-muted);}
.detail-meta span{display:flex;align-items:center;gap:6px;}
.detail-body h3{font-size:16px;margin:26px 0 10px;}
.detail-body p, .detail-body li{color:#3B3F4D;font-size:15px;line-height:1.7;}
.detail-body ul{padding-left:20px;margin:0;}
.detail-body li{margin-bottom:6px;}
.side-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.side-card h4{font-size:13px;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);color:var(--text-muted);margin-bottom:12px;font-weight:500;}
.apply-box{position:sticky;top:80px;}
.company-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.company-row .logo-sq{width:44px;height:44px;}

/* ============ FORMS ============ */
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
.form-group .hint{font-size:12px;color:var(--text-muted);margin-top:5px;}
.form-control{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:14px;}
.form-control:focus{outline:none;border-color:var(--ink);}
textarea.form-control{resize:vertical;min-height:100px;font-family:inherit;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.form-row{grid-template-columns:1fr;}}
.file-drop{border:1.5px dashed var(--line);border-radius:10px;padding:22px;text-align:center;cursor:pointer;background:var(--paper-dim);}
.file-drop:hover{border-color:var(--ink);}
.file-drop.has-file{border-style:solid;border-color:var(--teal);background:var(--teal-dim);}
.role-toggle{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:20px;}
.role-toggle button{flex:1;padding:11px;background:#fff;font-size:14px;font-weight:600;border:none;color:var(--text-muted);}
.role-toggle button.active{background:var(--ink);color:var(--paper);}
.security-note{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--text-muted);margin-top:14px;padding:10px 12px;background:var(--paper-dim);border-radius:8px;}

/* ============ MODAL ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(20,23,31,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:#fff;border-radius:14px;max-width:440px;width:100%;padding:28px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.modal.wide{max-width:560px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-head h3{font-size:20px;}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--paper-dim);font-size:16px;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px;}
.tab-btn{padding:10px 16px;font-size:14px;font-weight:600;color:var(--text-muted);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-1px;}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--amber);}

/* ============ DASHBOARD ============ */
.dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:12px;}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:24px 0 32px;}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
.stat-card b{font-family:var(--serif);font-size:28px;display:block;}
.stat-card span{font-size:12px;color:var(--text-muted);font-family:var(--mono);}
.table-wrap{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.dtable{width:100%;border-collapse:collapse;font-size:14px;}
.dtable th{text-align:left;padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);font-family:var(--mono);font-weight:500;background:var(--paper-dim);border-bottom:1px solid var(--line);}
.dtable td{padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
.dtable tr:last-child td{border-bottom:none;}
.dtable .actions{display:flex;gap:6px;flex-wrap:wrap;}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.03em;display:inline-block;}
.status-active{background:var(--teal-dim);color:var(--teal);}
.status-closed{background:#EEE9DC;color:var(--text-muted);}
.status-new{background:#E3E8FB;color:#3B4FCC;}
.status-reviewed{background:#FBEBD1;color:var(--amber-dark);}
.status-interview{background:var(--teal-dim);color:var(--teal);}
.status-hired{background:#DCF0D8;color:#2F7A24;}
.status-rejected{background:var(--rose-dim);color:var(--rose);}
@media(max-width:700px){.table-wrap{overflow-x:auto;}.dtable{min-width:640px;}}
.skill-editor{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.skill-chip{background:var(--paper-dim);padding:5px 10px 5px 12px;border-radius:16px;font-size:12px;display:flex;align-items:center;gap:6px;}
.skill-chip button{background:none;border:none;color:var(--text-muted);font-size:14px;line-height:1;padding:0;}

/* ============ TOAST ============ */
.toast-stack{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;max-width:340px;}
@media(max-width:520px){.toast-stack{left:16px;right:16px;max-width:none;}}
.toast{background:var(--ink);color:var(--paper);padding:14px 16px;border-radius:10px;font-size:13px;display:flex;gap:10px;align-items:flex-start;box-shadow:0 10px 30px rgba(0,0,0,0.25);animation:slideUp .2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.toast b{color:var(--amber);}

/* ============ FOOTER ============ */
.site-footer{border-top:1px solid var(--line);padding:40px 0;margin-top:40px;}
.footer-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
.footer-row .brand{font-size:18px;}
.footer-links{display:flex;gap:20px;font-size:13px;color:var(--text-muted);flex-wrap:wrap;}

/* ============ HOW IT WORKS ============ */
.how-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;}
@media(max-width:760px){.how-grid{grid-template-columns:1fr;}}
.how-col h3{font-size:13px;text-transform:uppercase;letter-spacing:0.06em;font-family:var(--mono);color:var(--teal);margin-bottom:18px;}
.step{display:flex;gap:14px;margin-bottom:20px;}
.step-num{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--amber-dark);flex-shrink:0;width:28px;}
.step p{font-size:14px;color:var(--text-muted);margin-top:2px;}
.step strong{font-size:15px;display:block;}

.cta-band{background:var(--ink);color:var(--paper);border-radius:16px;padding:44px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin:20px 0;}
.cta-band h2{color:var(--paper);font-size:26px;}
.cta-band p{color:var(--text-on-dark-muted);margin-top:6px;}

.notif-panel{position:absolute;top:48px;right:0;width:320px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:60;overflow:hidden;}
.notif-item{padding:14px 16px;border-bottom:1px solid var(--line);font-size:13px;}
.notif-item:last-child{border-bottom:none;}
.notif-item .t{font-size:11px;color:var(--text-muted);font-family:var(--mono);margin-top:4px;}
.notif-empty{padding:24px;text-align:center;color:var(--text-muted);font-size:13px;}

.page-pad{padding:40px 0 60px;}
.center-col{max-width:520px;margin:0 auto;}
.success-box{text-align:center;padding:50px 20px;}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--teal-dim);color:var(--teal);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-stack" class="toast-stack"></div>

<script>
(function(){

/* ================= DATA ================= */
const CATEGORIES = ['Engineering','Design','Product','Marketing','Sales','Operations','Customer Support','Data & Analytics'];
const TYPES = ['Full-time','Part-time','Contract','Internship'];
const AVATAR_COLORS = ['#3E7C74','#C6842A','#3B4FCC','#C1554A','#5B4B8A','#1E2233','#2F7A24'];

function colorFor(str){
  let h=0; for(let i=0;i<str.length;i++) h = str.charCodeAt(i) + ((h<<5)-h);
  return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];
}
function initials(name){
  return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

/* ================= UTILS ================= */
function timeAgo(days){
  if(days===0) return 'Today';
  if(days===1) return '1 day ago';
  if(days<7) return days+' days ago';
  if(days<14) return '1 week ago';
  return Math.floor(days/7)+' weeks ago';
}
function fmtSalary(min,max){ return '$'+min+'k – $'+max+'k'; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg, emailLine){
  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className='toast';
  el.innerHTML = '<span>✦</span><span>'+msg+(emailLine?('<br><b>✉ '+emailLine+'</b>'):'')+'</span>';
  stack.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s ease'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3800);
}

/* ---------- LISTINGS ---------- */
function filteredJobs(){
  let list = jobs.slice();
  const kw = (state.search||'').toLowerCase().trim();
  if(kw) list = list.filter(j=> j.title.toLowerCase().includes(kw) || j.company.toLowerCase().includes(kw) || j.tags.some(t=>t.toLowerCase().includes(kw)));
  const loc = (state.locationSearch||'').toLowerCase().trim();
  if(loc) list = list.filter(j=> j.location.toLowerCase().includes(loc) || (loc==='remote' && j.location==='Remote'));
  if(state.filters.categories.length) list = list.filter(j=>state.filters.categories.includes(j.category));
  if(state.filters.types.length) list = list.filter(j=>state.filters.types.includes(j.type));
  if(state.filters.location) list = list.filter(j=>j.location===state.filters.location);
  if(state.filters.remoteOnly) list = list.filter(j=>j.location==='Remote');
  if(state.sort==='newest') list.sort((a,b)=>a.daysAgo-b.daysAgo);
  if(state.sort==='salary') list.sort((a,b)=>b.salaryMax-a.salaryMax);
  return list;
}

/* ================= MASTER RENDER ================= */
function render(){
  let body = '';
  if(state.route==='home') body = homeTpl();
  else if(state.route==='listings') body = listingsTpl();
  else if(state.route==='job') body = jobDetailTpl();
  else if(state.route==='apply') body = applyTpl();
  else if(state.route==='employer') body = employerDashboardTpl();
  else if(state.route==='candidate') body = candidateDashboardTpl();

  document.getElementById('app').innerHTML = navTpl() + '<main>' + body + '</main>' + footerTpl() + authModalTpl();
  attachDynamicHandlers();
}

/* ================= EVENT HANDLERS ================= */
document.addEventListener('click', function(e){
  const t = e.target.closest('[data-action]');
  if(!t) { return; }
  const action = t.dataset.action;

  if(action==='none'){ e.preventDefault(); return; }
  if(action==='go'){ go(t.dataset.route, {id:t.dataset.id}); return; }
  if(action==='go-employer'){
    if(state.user && state.user.role==='employer'){ go('employer'); }
    else { state.authRole='employer'; state.authModal='signup'; render(); }
    return;
  }
  if(action==='go-candidate'){
    if(state.user && state.user.role==='candidate'){ go('candidate'); }
    else { state.authRole='candidate'; state.authModal='signup'; render(); }
    return;
  }
  if(action==='go-dashboard'){ go(state.user.role==='employer'?'employer':'candidate'); return; }
  if(action==='view-job'){ go('job', {id:t.dataset.id}); return; }
  if(action==='toggle-mobile-menu'){ state.mobileMenuOpen = !state.mobileMenuOpen; render(); return; }
  if(action==='toggle-mobile-filters'){ state.mobileFiltersOpen = !state.mobileFiltersOpen; render(); return; }
  if(action==='toggle-notif'){ state.notifPanelOpen = !state.notifPanelOpen; render(); return; }
  if(action==='open-auth'){ state.authModal = t.dataset.mode; render(); return; }
  if(action==='close-modal' || action==='close-modal-overlay'){ if(action==='close-modal-overlay' && e.target !== t) return; state.authModal=null; render(); return; }
  if(action==='set-auth-role'){ state.authRole = t.dataset.role; render(); return; }
  if(action==='logout'){ state.user=null; go('home'); showToast('You have been logged out.'); return; }

  if(action==='filter-category-go'){ state.filters.categories=[t.dataset.cat]; go('listings'); return; }
  if(action==='home-search'){
    state.search = document.getElementById('home-search-kw').value;
    state.locationSearch = document.getElementById('home-search-loc').value;
    go('listings'); return;
  }
  if(action==='list-search'){
    state.search = document.getElementById('list-search-kw').value;
    state.locationSearch = document.getElementById('list-search-loc').value;
    state.listingsLimit=8; render(); return;
  }
  if(action==='toggle-cat'){
    const c=t.dataset.cat; const i=state.filters.categories.indexOf(c);
    if(i>-1) state.filters.categories.splice(i,1); else state.filters.categories.push(c);
    state.listingsLimit=8; render(); return;
  }
  if(action==='toggle-type'){
    const c=t.dataset.type; const i=state.filters.types.indexOf(c);
    if(i>-1) state.filters.types.splice(i,1); else state.filters.types.push(c);
    state.listingsLimit=8; render(); return;
  }
  if(action==='toggle-remote'){ state.filters.remoteOnly = !state.filters.remoteOnly; state.listingsLimit=8; render(); return; }
  if(action==='clear-filters'){ state.filters={categories:[],types:[],location:'',remoteOnly:false}; state.search=''; state.locationSearch=''; state.listingsLimit=8; render(); return; }
  if(action==='load-more'){ state.listingsLimit += 8; render(); return; }

  if(action==='start-apply'){
    if(!state.user || state.user.role!=='candidate'){
      state.authRole='candidate'; state.authModal='login'; state.pendingApply=t.dataset.id; render(); return;
    }
    state.applyJobId = t.dataset.id; state.applySubmitted=false; state.resumeFileName = state.user.resume||null;
    go('apply'); return;
  }
  if(action==='toggle-save'){
    if(!state.user || state.user.role!=='candidate'){ state.authRole='candidate'; state.authModal='login'; render(); return; }
    const id=t.dataset.id; state.user.saved = state.user.saved||[];
    const i = state.user.saved.indexOf(id);
    if(i>-1){ state.user.saved.splice(i,1); showToast('Removed from saved jobs.'); }
    else { state.user.saved.push(id); showToast('Saved to your dashboard.'); }
    render(); return;
  }

  if(action==='set-emp-tab'){ state.employerTab=t.dataset.tab; render(); return; }
  if(action==='set-cand-tab'){ state.candidateTab=t.dataset.tab; render(); return; }
  if(action==='toggle-job-status'){
    const j=getJob(t.dataset.id); j.status = j.status==='Active'?'Closed':'Active'; render();
    showToast(j.status==='Closed'?'Job posting closed.':'Job posting reopened.'); return;
  }
  if(action==='delete-job'){
    const idx = jobs.findIndex(j=>j.id===t.dataset.id);
    if(idx>-1 && confirm('Delete this job posting? This cannot be undone.')){ jobs.splice(idx,1); render(); showToast('Job posting deleted.'); }
    return;
  }
  if(action==='set-app-status'){ return; } // handled by change listener below
  if(action==='remove-skill'){
    state.user.skills = (state.user.skills||[]).filter(s=>s!==t.dataset.skill); render(); return;
  }
});

document.addEventListener('change', function(e){
  const t = e.target.closest('[data-action]');
  if(t){
    if(t.dataset.action==='set-location-filter'){ state.filters.location = t.value; state.listingsLimit=8; render(); return; }
    if(t.dataset.action==='set-sort'){ state.sort = t.value; render(); return; }
    if(t.dataset.action==='set-app-status'){
      const j = getJob(t.dataset.job);
      const app = (j.newApplicants||[]).find(a=>a.id===t.dataset.app);
      if(app){
        app.status = t.value;
        const candApp = (state.user.candidateRef ? null : null);
        showToast('Status updated to "'+t.value+'".', 'Notified '+app.name+' at '+app.email);
        addNotification('You marked <b>'+esc(app.name)+'</b> as <b>'+t.value+'</b> for '+esc(j.title));
      }
      render(); return;
    }
  }
});

function attachDynamicHandlers(){
  const applyForm = document.getElementById('apply-form');
  if(applyForm){
    applyForm.addEventListener('submit', function(e){
      e.preventDefault();
      const fd = new FormData(applyForm);
      const j = getJob(state.applyJobId);
      const appObj = {jobId:j.id, date:'Just now', status:'New'};
      state.user.applications = state.user.applications||[];
      state.user.applications.unshift(appObj);
      j.newApplicants = j.newApplicants||[];
      j.newApplicants.unshift({id:'a'+Date.now(), name:fd.get('name'), email:fd.get('email'), date:'Just now', status:'New'});
      state.applySubmitted = true;
      addNotification('Application sent for <b>'+esc(j.title)+'</b> at '+esc(j.company));
      showToast('Application submitted!', 'Confirmation sent to '+fd.get('email'));
      render();
    });
    const resumeInput = document.getElementById('resume-input');
    if(resumeInput) resumeInput.addEventListener('change', function(){
      if(this.files[0]){ state.resumeFileName = this.files[0].name; render();
        document.getElementById('apply-form').scrollIntoView({block:'nearest'});
      }
    });
  }

  const authForm = document.getElementById('auth-form');
  if(authForm){
    authForm.addEventListener('submit', function(e){
      e.preventDefault();
      const fd = new FormData(authForm);
      const email = fd.get('email');
      const role = state.authRole;
      const mode = state.authModal;
      if(role==='candidate'){
        state.user = mode==='signup' ? {
          role:'candidate', name: fd.get('name')||'Candidate', email, applications:[], saved:[], skills:[]
        } : {
          role:'candidate', name: candidateSeed.name, email, headline:candidateSeed.headline,
          skills:[...candidateSeed.skills], resume:candidateSeed.resume,
          applications: candidateSeed.applications.map(a=>({...a})), saved:[...candidateSeed.saved]
        };
      } else {
        state.user = { role:'employer', name: fd.get('name')||email.split('@')[0], email, company: fd.get('company')||'' };
        if(mode==='login'){
          jobs.filter(j=>j.employerId==='emp-seed').slice(0,2).forEach(j=>{ j.postedByMe=true;
            j.newApplicants = j.newApplicants || [{id:'seedA1',name:'Riley Nguyen',email:'riley.n@example.com',date:'2 days ago',status:'New'},{id:'seedA2',name:'Sam Okafor',email:'sam.okafor@example.com',date:'4 days ago',status:'Reviewed'}];
          });
        }
      }
      state.authModal = null;
      showToast('Welcome, '+state.user.name.split(' ')[0]+'!', role==='candidate' && mode==='signup' ? 'Welcome email sent to '+email : null);
      if(state.pendingApply){
        state.applyJobId = state.pendingApply; state.pendingApply=null; state.applySubmitted=false;
        go('apply');
      } else {
        go(role==='employer'?'employer':'candidate');
      }
    });
  }

  const postForm = document.getElementById('post-job-form');
  if(postForm){
    postForm.addEventListener('submit', function(e){
      e.preventDefault();
      const fd = new FormData(postForm);
      const id = 'job-new-'+(jobIdCounter++);
      const newJob = {
        id, title:fd.get('title'), company: state.user.company||state.user.name, category:fd.get('category'),
        location:fd.get('location'), type:fd.get('type'), salaryMin:Number(fd.get('salaryMin')), salaryMax:Number(fd.get('salaryMax')),
        daysAgo:0, urgent: fd.get('urgent')==='on', tags:[fd.get('category')],
        desc: fd.get('desc'),
        resp: (fd.get('resp')||'').split('\\n').map(s=>s.trim()).filter(Boolean),
        reqs: (fd.get('reqs')||'').split('\\n').map(s=>s.trim()).filter(Boolean),
        applicants:0, status:'Active', employerId:'emp-'+state.user.name, postedByMe:true, newApplicants:[]
      };
      if(!newJob.resp.length) newJob.resp=['Details to be discussed during the interview process.'];
      if(!newJob.reqs.length) newJob.reqs=['Details to be discussed during the interview process.'];
      jobs.unshift(newJob);
      state.employerTab='overview';
      showToast('Job published!', 'Confirmation sent to '+state.user.email);
      addNotification('Your posting <b>'+esc(newJob.title)+'</b> is now live.');
      render();
    });
  }

  const profileForm = document.getElementById('profile-form');
  if(profileForm){
    profileForm.addEventListener('submit', function(e){
      e.preventDefault();
      const fd = new FormData(profileForm);
      state.user.name = fd.get('name'); state.user.headline = fd.get('headline');
      showToast('Profile saved.');
      render();
    });
    const skillInput = document.getElementById('skill-input');
    if(skillInput) skillInput.addEventListener('keydown', function(ev){
      if(ev.key==='Enter'){
        ev.preventDefault();
        const v = skillInput.value.trim();
        if(v){ state.user.skills = state.user.skills||[]; if(!state.user.skills.includes(v)) state.user.skills.push(v); render(); }
      }
    });
    const resumeInput2 = document.getElementById('profile-resume-input');
    if(resumeInput2) resumeInput2.addEventListener('change', function(){
      if(this.files[0]){ state.user.resume = this.files[0].name; showToast('Resume updated.'); render(); }
    });
  }
}

/* ================= INIT ================= */
render();
})();
</script>
